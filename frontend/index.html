<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Akun Google</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
    }
    .container { text-align: center; max-width: 320px; }
    h2 { margin-bottom: 12px; font-size: 20px; }
    p { margin-bottom: 24px; font-size: 14px; opacity: 0.7; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 24px; border: 1px solid #dadce0; border-radius: 4px;
      background: #fff; color: #3c4043; font-size: 14px; font-weight: 500;
      cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: #f7f8f8; }
    .btn img { width: 18px; height: 18px; }
    .loading { display: none; font-size: 14px; opacity: 0.7; }
    .error { display: none; color: #d93025; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Verifikasi Akun Google</h2>
    <p>Hubungkan akun Google Anda untuk melanjutkan.</p>
    <button class="btn" id="loginBtn" onclick="startAuth()">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="G">
      Sign in with Google
    </button>
    <p class="loading" id="loading">Memproses...</p>
    <p class="error" id="error"></p>
  </div>

  <script>
    const BACKEND_URL = 'https://wknd-tele-bot-emp.reyhandita.id';
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    async function startAuth() {
      const btn = document.getElementById('loginBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');

      btn.style.display = 'none';
      loading.style.display = 'block';
      error.style.display = 'none';

      try {
        const res = await fetch(BACKEND_URL + '/auth/init', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg.initData }),
        });

        if (!res.ok) throw new Error('Validasi gagal');

        const { url } = await res.json();
        window.location.href = url;
      } catch (e) {
        btn.style.display = 'inline-flex';
        loading.style.display = 'none';
        error.style.display = 'block';
        error.textContent = e.message || 'Terjadi kesalahan';
      }
    }
  </script>
</body>
</html>
